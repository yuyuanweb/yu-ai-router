spring:
  application:
    name: yu-ai-router
  profiles:
    active: local
  # session 配置
  session:
    # session 30 天过期
    timeout: 2592000
  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_ai_router
    username: root
    password: 123456
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  # Spring AI 配置
  ai:
    openai:
      # 通义千问兼容 OpenAI 接口
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${QWEN_API_KEY:YOUR_QWEN_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi 配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.airouter.controller
# knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
