spring:
  application:
    name: yu-ai-router
  profiles:
    active: local
  # session 配置
  session:
    # session 30 天过期
    timeout: 2592000
  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_ai_router
    username: root
    password: 123456
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  # Spring AI 配置
  ai:
    openai:
      # 通义千问兼容 OpenAI 接口
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${QWEN_API_KEY:YOUR_QWEN_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
# AI 网关配置
ai:
  cache:
    # 是否启用响应缓存
    enabled: true
    # 缓存过期时间（秒），默认1小时
    ttl: 3600
stripe:
  api-key: sk_test_51SsdkB2cAZC2ATNgs5x0hSyh2g3bE3Ys4lgxTn22QF4Ep3ek0QfxwUU9ZG4N04EF6T7vzMCtjDKKDeFof7j3995T00ysHZ0uuc
  webhook-secret: whsec_6c936e95bc9112c5453f083d083dbdd01c464eaebccde119ee5637142d18beb4
  success-url: http://localhost:5173/recharge/success  # 支付成功回调（前端页面）
  cancel-url: http://localhost:5173/recharge/cancel   # 支付取消回调（前端页面）
# 插件配置
plugin:
  serpapi:
    api-key: YOUR_SERPAPI_KEY  # 请在 application-local.yml 中配置实际的 API Key
# springdoc-openapi 配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.airouter.controller
# knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
